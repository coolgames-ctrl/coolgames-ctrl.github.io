<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Void Walker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { width: 100%; height: 100%; overflow: hidden; touch-action: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .anim-spin { animation: spin 1s linear infinite; }
        .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
        .anim-fadeup { animation: fadeUp 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="typescript,react">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const { useState, useEffect, useRef, useCallback } = React;

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  TYPES
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        interface JoystickData {
            active: boolean;
            touchId: number | null;
            x: number;
            y: number;
        }

        interface KeysMap {
            [code: string]: boolean;
        }

        interface GameState {
            playerPos: THREE.Vector3;
            playerRotY: number;
            isMoving: boolean;
            wasMoving: boolean;
        }

        interface AnimationState {
            mixer: THREE.AnimationMixer | null;
            idleAction: THREE.AnimationAction | null;
            walkAction: THREE.AnimationAction | null;
            activeAction: THREE.AnimationAction | null;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CONSTANTS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const IDLE_URL: string = 'https://fastly.jsdelivr.net/gh/coolgames-ctrl/3dmodels@2c2f1bc/Idle.glb';
        const WALK_URL: string = 'https://fastly.jsdelivr.net/gh/coolgames-ctrl/3dmodels@b2efd08/Walking.glb';
        const MOVE_SPEED: number = 4.5;
        const ROT_LERP: number = 12;
        const CAM_SMOOTHING: number = 5;
        const CROSSFADE_DUR: number = 0.25;
        const JOY_RADIUS: number = 50;
        const DEAD_ZONE: number = 0.12;

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  LOADING SCREEN COMPONENT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const LoadingScreen: React.FC<{ progress: number; visible: boolean }> = ({ progress, visible }) => {
            if (!visible) return null;
            return (
                <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white transition-opacity duration-700"
                     style={{ opacity: visible ? 1 : 0 }}>
                    <div className="relative flex items-center justify-center mb-8">
                        <div className="w-16 h-16 border-4 border-gray-200 border-t-gray-800 rounded-full anim-spin" />
                        <div className="absolute text-xs font-bold text-gray-600">
                            {Math.round(progress)}%
                        </div>
                    </div>
                    <p className="text-gray-500 text-sm tracking-widest uppercase anim-pulse">
                        Loading Models
                    </p>
                    <div className="w-48 h-1.5 bg-gray-200 rounded-full mt-5 overflow-hidden">
                        <div className="h-full bg-gray-700 rounded-full transition-all duration-300 ease-out"
                             style={{ width: `${progress}%` }} />
                    </div>
                </div>
            );
        };

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  JOYSTICK COMPONENT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const Joystick: React.FC<{ joystickRef: React.MutableRefObject<JoystickData> }> = ({ joystickRef }) => {
            const baseRef = useRef<HTMLDivElement>(null);
            const thumbRef = useRef<HTMLDivElement>(null);
            const [thumbPos, setThumbPos] = useState<{ x: number; y: number }>({ x: 0, y: 0 });
            const [pressing, setPressing] = useState<boolean>(false);

            const getCenter = useCallback((): { x: number; y: number } => {
                if (!baseRef.current) return { x: 0, y: 0 };
                const rect: DOMRect = baseRef.current.getBoundingClientRect();
                return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            }, []);

            const processInput = useCallback((clientX: number, clientY: number): void => {
                const center = getCenter();
                let dx: number = clientX - center.x;
                let dy: number = clientY - center.y;
                const dist: number = Math.sqrt(dx * dx + dy * dy);

                if (dist > JOY_RADIUS) {
                    dx = (dx / dist) * JOY_RADIUS;
                    dy = (dy / dist) * JOY_RADIUS;
                }

                setThumbPos({ x: dx, y: dy });
                joystickRef.current.x = dx / JOY_RADIUS;
                joystickRef.current.y = dy / JOY_RADIUS;
            }, [getCenter, joystickRef]);

            const resetJoystick = useCallback((): void => {
                joystickRef.current = { active: false, touchId: null, x: 0, y: 0 };
                setThumbPos({ x: 0, y: 0 });
                setPressing(false);
            }, [joystickRef]);

            const handleTouchStart = useCallback((e: React.TouchEvent<HTMLDivElement>): void => {
                e.preventDefault();
                e.stopPropagation();
                const touch: React.Touch = e.changedTouches[0];
                joystickRef.current.active = true;
                joystickRef.current.touchId = touch.identifier;
                setPressing(true);
                processInput(touch.clientX, touch.clientY);
            }, [joystickRef, processInput]);

            useEffect(() => {
                const onTouchMove = (e: TouchEvent): void => {
                    if (!joystickRef.current.active) return;
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        const t: Touch = e.changedTouches[i];
                        if (t.identifier === joystickRef.current.touchId) {
                            e.preventDefault();
                            processInput(t.clientX, t.clientY);
                            return;
                        }
                    }
                };

                const onTouchEnd = (e: TouchEvent): void => {
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        if (e.changedTouches[i].identifier === joystickRef.current.touchId) {
                            resetJoystick();
                            return;
                        }
                    }
                };

                const onMouseMove = (e: MouseEvent): void => {
                    if (joystickRef.current.active && joystickRef.current.touchId === -1) {
                        processInput(e.clientX, e.clientY);
                    }
                };

                const onMouseUp = (): void => {
                    if (joystickRef.current.active && joystickRef.current.touchId === -1) {
                        resetJoystick();
                    }
                };

                window.addEventListener('touchmove', onTouchMove, { passive: false });
                window.addEventListener('touchend', onTouchEnd);
                window.addEventListener('touchcancel', onTouchEnd);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);

                return () => {
                    window.removeEventListener('touchmove', onTouchMove);
                    window.removeEventListener('touchend', onTouchEnd);
                    window.removeEventListener('touchcancel', onTouchEnd);
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
            }, [joystickRef, processInput, resetJoystick]);

            const handleMouseDown = useCallback((e: React.MouseEvent<HTMLDivElement>): void => {
                joystickRef.current.active = true;
                joystickRef.current.touchId = -1;
                setPressing(true);
                processInput(e.clientX, e.clientY);
            }, [joystickRef, processInput]);

            return (
                <div className="fixed bottom-8 left-6 z-30 select-none anim-fadeup" style={{ animationDelay: '0.3s' }}>
                    <div
                        ref={baseRef}
                        onTouchStart={handleTouchStart}
                        onMouseDown={handleMouseDown}
                        className={`relative w-36 h-36 rounded-full border-2 transition-all duration-200 ${
                            pressing
                                ? 'bg-black/10 border-black/25 scale-95'
                                : 'bg-black/[0.06] border-black/[0.12]'
                        }`}
                        style={{ backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)' }}
                    >
                        {/* Direction indicators */}
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div className="absolute top-2.5 w-1.5 h-1.5 rounded-full bg-black/10" />
                            <div className="absolute bottom-2.5 w-1.5 h-1.5 rounded-full bg-black/10" />
                            <div className="absolute left-2.5 w-1.5 h-1.5 rounded-full bg-black/10" />
                            <div className="absolute right-2.5 w-1.5 h-1.5 rounded-full bg-black/10" />
                        </div>

                        {/* Thumb */}
                        <div
                            ref={thumbRef}
                            className={`absolute w-14 h-14 rounded-full pointer-events-none transition-shadow duration-150
                                        top-1/2 left-1/2 ${pressing ? 'shadow-lg shadow-black/20' : 'shadow-md shadow-black/15'}`}
                            style={{
                                transform: `translate(calc(-50% + ${thumbPos.x}px), calc(-50% + ${thumbPos.y}px))`,
                                background: pressing
                                    ? 'radial-gradient(circle, rgba(40,40,40,0.7) 0%, rgba(20,20,20,0.8) 100%)'
                                    : 'radial-gradient(circle, rgba(70,70,70,0.5) 0%, rgba(40,40,40,0.6) 100%)',
                            }}
                        />
                    </div>
                </div>
            );
        };

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ANIMATION STATE INDICATOR
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const StateIndicator: React.FC<{ moving: boolean }> = ({ moving }) => (
            <div className="fixed top-4 right-4 z-30 pointer-events-none anim-fadeup" style={{ animationDelay: '0.6s' }}>
                <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium tracking-wide
                                 transition-all duration-300 backdrop-blur-md ${
                    moving
                        ? 'bg-emerald-500/15 text-emerald-700 border border-emerald-500/20'
                        : 'bg-gray-500/10 text-gray-500 border border-gray-500/15'
                }`}>
                    <span className={`w-1.5 h-1.5 rounded-full transition-colors duration-300 ${
                        moving ? 'bg-emerald-500' : 'bg-gray-400'
                    }`} />
                    {moving ? 'WALKING' : 'IDLE'}
                </div>
            </div>
        );

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  THREE.JS SCENE BUILDER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function buildScene(canvas: HTMLCanvasElement): {
            scene: THREE.Scene;
            camera: THREE.PerspectiveCamera;
            renderer: THREE.WebGLRenderer;
            ground: THREE.Mesh;
            grid: THREE.GridHelper;
            dirLight: THREE.DirectionalLight;
            shadowBlob: THREE.Mesh;
            particles: THREE.Points;
        } {
            // Scene
            const scene: THREE.Scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            scene.fog = new THREE.FogExp2(0xffffff, 0.018);

            // Camera
            const camera: THREE.PerspectiveCamera = new THREE.PerspectiveCamera(
                55, window.innerWidth / window.innerHeight, 0.1, 500
            );
            camera.position.set(0, 4.5, 8);

            // Renderer
            const renderer: THREE.WebGLRenderer = new THREE.WebGLRenderer({
                canvas,
                antialias: true,
                alpha: false,
                powerPreference: 'high-performance',
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;

            // Lighting
            const ambientLight: THREE.AmbientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const hemiLight: THREE.HemisphereLight = new THREE.HemisphereLight(0xffffff, 0xf5f5f5, 0.5);
            scene.add(hemiLight);

            const dirLight: THREE.DirectionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(8, 15, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.set(1024, 1024);
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            const sc: number = 15;
            dirLight.shadow.camera.left = -sc;
            dirLight.shadow.camera.right = sc;
            dirLight.shadow.camera.top = sc;
            dirLight.shadow.camera.bottom = -sc;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);
            scene.add(dirLight.target);

            // Ground
            const groundGeo: THREE.PlaneGeometry = new THREE.PlaneGeometry(500, 500);
            const groundMat: THREE.MeshStandardMaterial = new THREE.MeshStandardMaterial({
                color: 0xfafafa,
                roughness: 0.95,
                metalness: 0.0,
            });
            const ground: THREE.Mesh = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Grid
            const grid: THREE.GridHelper = new THREE.GridHelper(500, 250, 0xe0e0e0, 0xededed);
            (grid.material as THREE.Material).transparent = true;
            (grid.material as THREE.Material).opacity = 0.45;
            scene.add(grid);

            // Shadow Blob
            const blobGeo: THREE.CircleGeometry = new THREE.CircleGeometry(0.5, 32);
            const blobMat: THREE.MeshBasicMaterial = new THREE.MeshBasicMaterial({
                color: 0x000000,
                transparent: true,
                opacity: 0.12,
                depthWrite: false,
            });
            const shadowBlob: THREE.Mesh = new THREE.Mesh(blobGeo, blobMat);
            shadowBlob.rotation.x = -Math.PI / 2;
            shadowBlob.position.y = 0.01;
            scene.add(shadowBlob);

            // Particles
            const pCount: number = 150;
            const pGeo: THREE.BufferGeometry = new THREE.BufferGeometry();
            const positions: Float32Array = new Float32Array(pCount * 3);
            for (let i: number = 0; i < pCount; i++) {
                positions[i * 3]     = (Math.random() - 0.5) * 80;
                positions[i * 3 + 1] = Math.random() * 12 + 0.5;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 80;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const pMat: THREE.PointsMaterial = new THREE.PointsMaterial({
                color: 0xc0c0c0,
                size: 0.07,
                transparent: true,
                opacity: 0.5,
                sizeAttenuation: true,
            });
            const particles: THREE.Points = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            return { scene, camera, renderer, ground, grid, dirLight, shadowBlob, particles };
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  MODEL LOADER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        async function loadModels(
            scene: THREE.Scene,
            onProgress: (pct: number) => void
        ): Promise<{ model: THREE.Group; anims: AnimationState }> {
            const loader: GLTFLoader = new GLTFLoader();
            let totalLoaded: number = 0;

            const trackProgress = (): void => {
                totalLoaded++;
                onProgress((totalLoaded / 2) * 100);
            };

            // Load both models in parallel
            const [idleGltf, walkGltf] = await Promise.all([
                new Promise<any>((resolve, reject) => {
                    loader.load(IDLE_URL, (gltf: any) => { trackProgress(); resolve(gltf); },
                        undefined, reject);
                }),
                new Promise<any>((resolve, reject) => {
                    loader.load(WALK_URL, (gltf: any) => { trackProgress(); resolve(gltf); },
                        undefined, reject);
                }),
            ]);

            // Use the idle model as the base character mesh
            const model: THREE.Group = idleGltf.scene;

            // Auto-scale to ~1.8 units tall
            const box: THREE.Box3 = new THREE.Box3().setFromObject(model);
            const size: THREE.Vector3 = box.getSize(new THREE.Vector3());
            const desiredHeight: number = 1.8;
            const scale: number = desiredHeight / size.y;
            model.scale.setScalar(scale);

            // Enable shadows on all meshes
            model.traverse((child: THREE.Object3D) => {
                if ((child as THREE.Mesh).isMesh) {
                    (child as THREE.Mesh).castShadow = true;
                    (child as THREE.Mesh).receiveShadow = true;
                }
            });

            model.position.set(0, 0, 0);
            scene.add(model);

            // Setup animation mixer on base model
            const mixer: THREE.AnimationMixer = new THREE.AnimationMixer(model);

            // Get animation clips
            const idleClip: THREE.AnimationClip = idleGltf.animations[0];
            const walkClip: THREE.AnimationClip = walkGltf.animations[0];

            // Create actions
            const idleAction: THREE.AnimationAction = mixer.clipAction(idleClip);
            const walkAction: THREE.AnimationAction = mixer.clipAction(walkClip);

            // Configure actions
            idleAction.setLoop(THREE.LoopRepeat, Infinity);
            walkAction.setLoop(THREE.LoopRepeat, Infinity);

            // Start both with weight control
            idleAction.setEffectiveWeight(1);
            walkAction.setEffectiveWeight(0);
            idleAction.play();
            walkAction.play();

            const anims: AnimationState = {
                mixer,
                idleAction,
                walkAction,
                activeAction: idleAction,
            };

            return { model, anims };
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CROSSFADE HELPER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function crossFadeTo(
            anims: AnimationState,
            newAction: THREE.AnimationAction,
            duration: number
        ): void {
            if (anims.activeAction === newAction) return;

            const prevAction: THREE.AnimationAction | null = anims.activeAction;
            anims.activeAction = newAction;

            newAction.reset();
            newAction.setEffectiveTimeScale(1);
            newAction.setEffectiveWeight(1);
            newAction.play();

            if (prevAction) {
                prevAction.crossFadeTo(newAction, duration, true);
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  MAIN APP COMPONENT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const App: React.FC = () => {
            const canvasRef = useRef<HTMLCanvasElement>(null);
            const [loading, setLoading] = useState<boolean>(true);
            const [progress, setProgress] = useState<number>(0);
            const [isMoving, setIsMoving] = useState<boolean>(false);

            const joystickData = useRef<JoystickData>({ active: false, touchId: null, x: 0, y: 0 });
            const keysRef = useRef<KeysMap>({});

            // Keyboard handlers
            useEffect(() => {
                const onKeyDown = (e: KeyboardEvent): void => { keysRef.current[e.code] = true; };
                const onKeyUp   = (e: KeyboardEvent): void => { keysRef.current[e.code] = false; };
                const preventGestures = (e: Event): void => { e.preventDefault(); };

                window.addEventListener('keydown', onKeyDown);
                window.addEventListener('keyup', onKeyUp);
                document.addEventListener('gesturestart', preventGestures);
                document.addEventListener('gesturechange', preventGestures);

                return () => {
                    window.removeEventListener('keydown', onKeyDown);
                    window.removeEventListener('keyup', onKeyUp);
                    document.removeEventListener('gesturestart', preventGestures);
                    document.removeEventListener('gesturechange', preventGestures);
                };
            }, []);

            // Main Three.js setup
            useEffect(() => {
                if (!canvasRef.current) return;

                const {
                    scene, camera, renderer, ground, grid, dirLight, shadowBlob, particles
                } = buildScene(canvasRef.current);

                // Game state refs (mutable, no re-render)
                const gameState: GameState = {
                    playerPos: new THREE.Vector3(0, 0, 0),
                    playerRotY: 0,
                    isMoving: false,
                    wasMoving: false,
                };

                let animState: AnimationState = {
                    mixer: null,
                    idleAction: null,
                    walkAction: null,
                    activeAction: null,
                };

                let model: THREE.Group | null = null;
                let frameId: number = 0;
                const clock: THREE.Clock = new THREE.Clock();

                // Smoothing helpers
                const camTarget: THREE.Vector3 = new THREE.Vector3();
                const lookTarget: THREE.Vector3 = new THREE.Vector3();
                const camOffset: THREE.Vector3 = new THREE.Vector3(0, 4.5, 7.5);
                const camLookOffset: THREE.Vector3 = new THREE.Vector3(0, 1.2, 0);

                // Load models
                loadModels(scene, (pct: number) => setProgress(pct))
                    .then(({ model: m, anims }) => {
                        model = m;
                        animState = anims;
                        setTimeout(() => setLoading(false), 500);
                    })
                    .catch((err: Error) => console.error('Model load failed:', err));

                // Keyboard input reader
                function getKeyboardInput(): { x: number; y: number } {
                    const k: KeysMap = keysRef.current;
                    let kx: number = 0;
                    let ky: number = 0;
                    if (k['KeyA'] || k['ArrowLeft'])  kx -= 1;
                    if (k['KeyD'] || k['ArrowRight']) kx += 1;
                    if (k['KeyW'] || k['ArrowUp'])    ky -= 1;
                    if (k['KeyS'] || k['ArrowDown'])  ky += 1;
                    const m: number = Math.sqrt(kx * kx + ky * ky);
                    if (m > 1) { kx /= m; ky /= m; }
                    return { x: kx, y: ky };
                }

                // Infinite ground re-centering
                function snapGround(pos: THREE.Vector3): void {
                    const snap: number = 2;
                    const sx: number = Math.round(pos.x / snap) * snap;
                    const sz: number = Math.round(pos.z / snap) * snap;
                    ground.position.x = sx;
                    ground.position.z = sz;
                    grid.position.x = sx;
                    grid.position.z = sz;
                }

                // ── GAME LOOP ──
                function animate(): void {
                    frameId = requestAnimationFrame(animate);
                    const dt: number = Math.min(clock.getDelta(), 0.05);

                    // Combine input
                    const kb = getKeyboardInput();
                    let ix: number = joystickData.current.x + kb.x;
                    let iy: number = joystickData.current.y + kb.y;
                    let mag: number = Math.sqrt(ix * ix + iy * iy);
                    if (mag > 1) { ix /= mag; iy /= mag; mag = 1; }

                    gameState.isMoving = mag > DEAD_ZONE;

                    if (model) {
                        // Movement
                        if (gameState.isMoving) {
                            gameState.playerPos.x += ix * MOVE_SPEED * dt;
                            gameState.playerPos.z += iy * MOVE_SPEED * dt;

                            // Rotation towards movement direction
                            const targetRot: number = Math.atan2(-ix, -iy);
                            let diff: number = targetRot - gameState.playerRotY;
                            if (diff > Math.PI)  diff -= Math.PI * 2;
                            if (diff < -Math.PI) diff += Math.PI * 2;
                            gameState.playerRotY += diff * ROT_LERP * dt;
                        }

                        model.position.copy(gameState.playerPos);
                        model.rotation.y = gameState.playerRotY;

                        // Shadow blob
                        shadowBlob.position.x = gameState.playerPos.x;
                        shadowBlob.position.z = gameState.playerPos.z;

                        // ── Animation crossfading ──
                        if (gameState.isMoving && !gameState.wasMoving) {
                            // Started moving → crossfade to walk
                            if (animState.walkAction) {
                                crossFadeTo(animState, animState.walkAction, CROSSFADE_DUR);
                            }
                        } else if (!gameState.isMoving && gameState.wasMoving) {
                            // Stopped moving → crossfade to idle
                            if (animState.idleAction) {
                                crossFadeTo(animState, animState.idleAction, CROSSFADE_DUR);
                            }
                        }

                        // Walk speed scales with input magnitude
                        if (gameState.isMoving && animState.walkAction) {
                            const targetSpeed: number = 0.7 + mag * 0.5;
                            const currentSpeed: number = animState.walkAction.getEffectiveTimeScale();
                            animState.walkAction.setEffectiveTimeScale(
                                THREE.MathUtils.lerp(currentSpeed, targetSpeed, 8 * dt)
                            );
                        }

                        gameState.wasMoving = gameState.isMoving;

                        // Camera follow
                        camTarget.copy(gameState.playerPos).add(camOffset);
                        camera.position.lerp(camTarget, 1 - Math.exp(-CAM_SMOOTHING * dt));

                        lookTarget.copy(gameState.playerPos).add(camLookOffset);
                        camera.lookAt(lookTarget);

                        // Directional light follows player
                        dirLight.position.set(
                            gameState.playerPos.x + 8, 15, gameState.playerPos.z + 10
                        );
                        dirLight.target.position.copy(gameState.playerPos);

                        // Infinite ground
                        snapGround(gameState.playerPos);

                        // Particles follow
                        particles.position.x = gameState.playerPos.x;
                        particles.position.z = gameState.playerPos.z;
                    }

                    // Gentle particle drift
                    particles.rotation.y += dt * 0.015;

                    // Update mixer
                    if (animState.mixer) animState.mixer.update(dt);

                    // Update React state for UI (throttled by RAF)
                    setIsMoving(gameState.isMoving);

                    renderer.render(scene, camera);
                }

                animate();

                // Resize handler
                const onResize = (): void => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', onResize);

                return () => {
                    cancelAnimationFrame(frameId);
                    window.removeEventListener('resize', onResize);
                    renderer.dispose();
                };
            }, []);

            return (
                <div className="relative w-full h-full">
                    {/* Three.js Canvas */}
                    <canvas ref={canvasRef} className="block w-full h-full" />

                    {/* Loading Screen */}
                    <LoadingScreen progress={progress} visible={loading} />

                    {/* HUD - only visible after loaded */}
                    {!loading && (
                        <>
                            {/* Top info bar */}
                            <div className="fixed top-4 left-1/2 -translate-x-1/2 z-30 pointer-events-none anim-fadeup">
                                <p className="text-gray-400 text-xs tracking-widest uppercase text-center">
                                    Joystick to move · WASD on desktop
                                </p>
                            </div>

                            {/* State indicator */}
                            <StateIndicator moving={isMoving} />

                            {/* Joystick */}
                            <Joystick joystickRef={joystickData} />
                        </>
                    )}
                </div>
            );
        };

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  MOUNT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const rootEl: HTMLElement = document.getElementById('root')!;
        const root = ReactDOM.createRoot(rootEl);
        root.render(<App />);
    </script>
</body>
</html>
